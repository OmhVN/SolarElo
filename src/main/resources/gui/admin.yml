  title: "ᴇʟᴏ ʜɪsᴛᴏʀʏ - {player}"
  gui-disposition:
    - "xxxxxxxxx"
    - "xxxxxxxxx"
    - "xxxxxxxxx"
    - "xxxxxxxxx"
    - "xxxxxxxxx"
