# Active Quest Details GUI Configuration (Chi tiết nhiệm vụ đang nhận)
title: "ᴀᴄᴛɪᴠᴇ ᴄᴏɴᴛʀᴀᴄᴛ"
gui-disposition:
  - "#########"
  - "##q#n#c##"
  - "####a####"

# Background filler glass panels
filler:
  enabled: false
  material: "GRAY_STAINED_GLASS_PANE"

# The active quest target info item
active-item:
  material: "PLAYER_HEAD"
  name: "#ff3c3cᴛᴀʀɢᴇᴛ #ffffff{target}"
  lore:
    - "#aaaaaaElo: #ffaa00{elo}"
    - "#aaaaaaRank: &r{rank}"
    - "#aaaaaaElo Reward: #00ff3c+{reward_elo}"
    - "#aaaaaaTime Remaining: #ffaa00{time_remaining}"
    - ""
    - "#ffffffFind and eliminate #ffaa00{target} #ffffffto get rewards!"
    - "#ffffffIf they log out, the contract is preserved."

# Cancel button
cancel-item:
  material: "BARRIER"
  name: "#ff3c3cᴄᴀɴᴄᴇʟ ᴄᴏɴᴛʀᴀᴄᴛ"
  lore:
    - "#ffffffClick to cancel the current bounty contract."
    - "#ffffffYou will be penalized with a #ff3c3c{cooldown} second #ffffffcooldown"
    - "#ffffffbefore you can accept another quest."
  confirm_sound: error

# Back to Bounty list button
back-button:
  material: "ARROW"
  name: "#00BFFFʙᴀᴄᴋ"
  lore:
    - "&fGo back to Bounty List"
  confirm_sound: click
  customModelData: -1

# Item shown when there is no active quest (Khi không có nhiệm vụ hoạt động)
no-quest-item:
  material: "BARRIER"
  name: "#ff3c3cɴᴏ ᴀᴄᴛɪᴠᴇ ᴄᴏɴᴛʀᴀᴄᴛ"
  lore:
    - "#aaaaaaYou have no active bounty contracts currently."
    - "#aaaaaaGo back and select a target!"

config-version: "1.5"
