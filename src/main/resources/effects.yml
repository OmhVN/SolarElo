# ── GUI Sounds ────────────────────────────────────────────────────────
# Âm thanh khi click vào nút GUI
# Played when a GUI button is clicked
click:
  enabled: true
  sound: UI_BUTTON_CLICK
  volume: 1.0
  pitch: 1.0

# Âm thanh khi nhặt kinh nghiệm
# Played when experience orb is picked up
xp:
  enabled: true
  sound: ENTITY_EXPERIENCE_ORB_PICKUP
  volume: 1.0
  pitch: 1.0

# Âm thanh khi có lỗi
# Played on error
error:
  enabled: true
  sound: ENTITY_VILLAGER_NO
  volume: 1.0
  pitch: 1.0

# ── ELO & Rank Effects (Sounds & Particles) ───────────────────────────
effects:
  kill:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.0
    particle: "VILLAGER_HAPPY"
    particle-count: 10
  death:
    sound: "ENTITY_PLAYER_HURT"
    volume: 1.0
    pitch: 0.8
    particle: "SMOKE"
    particle-count: 10
  plus:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.0
    particle: "VILLAGER_HAPPY"
    particle-count: 10
  minus:
    sound: "ENTITY_PLAYER_HURT"
    volume: 1.0
    pitch: 0.8
    particle: "SMOKE"
    particle-count: 10
  rank-up:
    sound: "UI_TOAST_CHALLENGE_COMPLETE"
    volume: 1.0
    pitch: 1.0
    particle: "TOTEM_OF_UNDYING"
    particle-count: 30
  rank-down:
    sound: "ENTITY_WITHER_DEATH"
    volume: 0.5
    pitch: 0.8
    particle: "LARGE_SMOKE"
    particle-count: 15
  bonus:
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.2
    particle: "ENCHANTMENT_TABLE"
    particle-count: 20

config-version: "1.5"
